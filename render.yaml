services:
  - type: web
    name: portfolio-minh
    runtime: node
    plan: free
    region: singapore
    buildCommand: npm install && npx prisma generate && NODE_OPTIONS="--max-old-space-size=460" npx next build
    startCommand: mkdir -p db public/uploads && npx prisma db push --skip-generate && npx next start -p $PORT
    envVars:
      - key: DATABASE_URL
        value: file:./db/custom.db
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: "1"
      - key: NODE_OPTIONS
        value: "--max-old-space-size=460"
    # Render free tier has ephemeral filesystem
    # Database & uploads will reset on each deploy
    # For persistent data, upgrade to a paid plan with Render Disk
